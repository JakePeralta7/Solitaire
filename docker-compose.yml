services:
  solitaire:
    image: ghcr.io/jakeperalta7/solitaire:latest
    ports:
      - "3003:3000"
    volumes:
      - solitaire-data:/data
    environment:
      NODE_ENV: production
      DB_PATH: /data/solitaire.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/leaderboard?draw_mode=1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  solitaire-data:
